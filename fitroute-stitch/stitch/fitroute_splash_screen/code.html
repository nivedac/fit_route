<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitRoute Splash Screen - Refined Dark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "charcoal": "#121212",
                        "accent-orange": "#E67E22",
                        "surface": "#1E1E1E",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --bg-charcoal: #121212;
            --accent-muted: #E67E22;
        }
        body {
            background-color: var(--bg-charcoal);
            min-height: 100dvh;
        }
        .refined-glow {
            filter: drop-shadow(0 0 12px rgba(230, 126, 34, 0.25));
        }
        .logo-border {
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display overflow-hidden select-none bg-charcoal">
<div class="h-11 w-full flex items-center justify-between px-8 pt-4">
<span class="text-[14px] font-semibold text-white">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px] text-white">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px] text-white">wifi</span>
<span class="material-symbols-outlined text-[18px] text-white">battery_full_alt</span>
</div>
</div>
<div class="relative flex h-[calc(100vh-44px)] w-full flex-col items-center justify-center">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-accent-orange/5 rounded-full blur-[120px]"></div>
</div>
<div class="flex flex-col items-center gap-8 z-10">
<div class="relative group">
<div class="absolute -inset-0.5 rounded-[40px] bg-white/5 blur-sm"></div>
<div class="relative flex items-center justify-center w-32 h-32 rounded-[36px] logo-border border border-white/10 backdrop-blur-sm">
<span class="material-symbols-outlined text-[64px] text-accent-orange refined-glow" style="font-variation-settings: 'FILL' 1, 'wght' 300;">
                        route
                    </span>
</div>
</div>
<div class="flex flex-col items-center text-center px-8">
<h1 class="text-white text-4xl font-bold tracking-tight mb-2">
                    FitRoute
                </h1>
<p class="text-white/50 text-base font-normal tracking-[0.01em] max-w-[280px]">
                    Sophisticated Fitness Intelligence
                </p>
</div>
</div>
<div class="absolute bottom-32 w-full flex justify-center">
<div class="w-12 h-1.5 bg-white/5 rounded-full overflow-hidden">
<div class="h-full bg-accent-orange w-1/3 rounded-full opacity-60"></div>
</div>
</div>
<div class="absolute bottom-16 text-center w-full">
<p class="text-[10px] text-white/30 uppercase tracking-[0.4em] font-semibold">
                Powered by <span class="text-white/50">FitRoute Intelligence</span>
</p>
</div>
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/10 rounded-full"></div>
</div>

</body></html>
