<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Android Goals Refined Dark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "charcoal": "#121212",
                        "charcoal-light": "#1E1E1E",
                        "accent-primary": "#E2FF3B", // High-energy lime/yellow accent
                        "text-main": "#FFFFFF",
                        "text-muted": "#94A3B8",
                        "border-subtle": "#2D2D2D"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-black text-text-main antialiased;
            }
        }
        @layer utilities {
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #2D2D2D;
                border-radius: 10px;
            }
        }
        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: #2D2D2D;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #E2FF3B;
            margin-top: -8px;
            cursor: pointer;
            border: 2px solid #121212;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex justify-center items-center min-h-screen">
<div class="relative flex h-[844px] w-full max-w-[390px] flex-col bg-charcoal shadow-2xl overflow-hidden rounded-[40px] border border-white/5">
<div class="flex items-center px-6 pt-12 pb-6 justify-between">
<button class="text-text-muted hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<span class="text-sm font-semibold tracking-wider text-text-muted">GOAL SETUP</span>
<div class="w-6"></div>
</div>
<div class="px-8 mb-8">
<div class="flex justify-between items-center mb-3">
<span class="text-[10px] font-bold uppercase tracking-[0.15em] text-text-muted">Step 02 of 05</span>
<span class="text-[10px] font-bold text-accent-primary">40%</span>
</div>
<div class="h-[2px] w-full bg-border-subtle rounded-full overflow-hidden">
<div class="h-full bg-accent-primary w-[40%] transition-all duration-500"></div>
</div>
</div>
<div class="flex-1 overflow-y-auto px-8 pb-32 custom-scrollbar">
<header class="mb-10">
<h1 class="text-3xl font-bold text-white mb-2">Refine your metrics</h1>
<p class="text-text-muted text-sm leading-relaxed">Adjust your biological parameters to ensure precision-grade coaching calibration.</p>
</header>
<div class="grid grid-cols-2 gap-4 mb-10">
<div class="space-y-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-text-muted">Current (kg)</label>
<div class="bg-charcoal-light rounded-xl p-4 border border-border-subtle focus-within:border-accent-primary transition-all">
<input class="w-full bg-transparent border-none p-0 text-xl font-bold text-white focus:ring-0" type="number" value="75"/>
</div>
</div>
<div class="space-y-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-text-muted">Target (kg)</label>
<div class="bg-charcoal-light rounded-xl p-4 border border-border-subtle focus-within:border-accent-primary transition-all">
<input class="w-full bg-transparent border-none p-0 text-xl font-bold text-white focus:ring-0" type="number" value="70"/>
</div>
</div>
</div>
<div class="mb-10 bg-charcoal-light rounded-2xl p-6 border border-border-subtle">
<div class="flex justify-between items-center mb-6">
<label class="text-[10px] font-bold uppercase tracking-widest text-text-muted">Age</label>
<span class="text-xl font-bold text-white">25 <span class="text-xs text-text-muted font-normal">yrs</span></span>
</div>
<input class="w-full" max="80" min="18" type="range" value="25"/>
</div>
<div class="mb-10">
<label class="text-[10px] font-bold uppercase tracking-widest text-text-muted block mb-4">Identity</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center py-5 rounded-2xl bg-accent-primary text-black transition-all">
<span class="material-symbols-outlined text-2xl mb-1 fill-icon">male</span>
<span class="text-[10px] font-bold uppercase">Male</span>
</button>
<button class="flex flex-col items-center justify-center py-5 rounded-2xl bg-charcoal-light border border-border-subtle text-text-muted hover:text-white transition-all">
<span class="material-symbols-outlined text-2xl mb-1">female</span>
<span class="text-[10px] font-bold uppercase">Female</span>
</button>
<button class="flex flex-col items-center justify-center py-5 rounded-2xl bg-charcoal-light border border-border-subtle text-text-muted hover:text-white transition-all">
<span class="material-symbols-outlined text-2xl mb-1">brand_family</span>
<span class="text-[10px] font-bold uppercase">Other</span>
</button>
</div>
</div>
<div class="mb-10">
<label class="text-[10px] font-bold uppercase tracking-widest text-text-muted block mb-2">Timeline</label>
<div class="relative">
<select class="w-full appearance-none bg-charcoal-light border border-border-subtle rounded-xl h-14 px-4 text-white font-medium text-sm focus:ring-1 focus:ring-accent-primary focus:border-accent-primary">
<option>12 Weeks (Optimal Pace)</option>
<option>8 Weeks (Intensive)</option>
<option>24 Weeks (Steady)</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-text-muted">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</div>
</div>
<div class="p-5 rounded-2xl bg-charcoal-light/50 border border-border-subtle mb-6">
<div class="flex gap-4 items-center">
<div class="w-10 h-10 flex items-center justify-center bg-charcoal rounded-full border border-border-subtle">
<span class="material-symbols-outlined text-accent-primary text-xl">insights</span>
</div>
<div>
<p class="text-xs font-bold text-white uppercase tracking-wider">Projected Velocity</p>
<p class="text-text-muted text-xs mt-1">Recommended loss rate of <span class="text-white font-semibold">0.4kg / week</span></p>
</div>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-charcoal via-charcoal to-transparent">
<button class="w-full h-14 bg-accent-primary rounded-2xl flex items-center justify-center gap-2 group active:scale-[0.98] transition-all">
<span class="text-black font-bold text-sm uppercase tracking-widest">Continue</span>
<span class="material-symbols-outlined text-black text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>

</body></html>
