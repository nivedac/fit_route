<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Android Edit Profile Refined</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2870d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative mx-auto flex h-full min-h-screen w-full max-w-[430px] flex-col bg-background-light dark:bg-background-dark shadow-2xl overflow-x-hidden">
<!-- Top Navigation Bar (Material 3 Style) -->
<div class="sticky top-0 z-10 flex items-center bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md p-4 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-4">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Edit Profile</h2>
</div>
<button class="text-primary text-base font-bold leading-normal px-4 py-2 hover:bg-primary/10 rounded-lg transition-colors">
                Save
            </button>
</div>
<!-- Profile Photo Section -->
<div class="flex p-8 items-center justify-center">
<div class="relative group">
<div class="size-32 rounded-full border-2 border-primary/20 p-1">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-full w-full shadow-xl" data-alt="Athletic person profile picture for fitness app" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBVKhtFBqKGQyh-4LtPH8PQ3ghzqgyQEfFhDcaZQ80x1LuVYln8VnP9KNWXBtCERpM30c9AcC359wPQU_k7iAW5uRVwS4op_lQVdg5vTcnN1Ff9DnNWKAueBeWNPUNEsea-Xm6yXYpGnJE_1sBBzyNiB-Ch8HEqVuL3jME10mQwO7zO9yybkNJhNbxXxLa3XD4ZCXA5cSeP4JlJETwfHWWYQXYXC6JE8DTukXLztqW8aw2AOXH114tDAwq4AxSP8LtWaFE8uJLqag");'>
</div>
</div>
<!-- Edit Icon Overlay (Sunset Orange) -->
<button class="absolute bottom-0 right-0 bg-primary text-white p-2.5 rounded-full shadow-lg border-4 border-background-dark flex items-center justify-center transition-transform hover:scale-110">
<span class="material-symbols-outlined text-[20px]">photo_camera</span>
</button>
</div>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6 px-6 pb-10">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-600 dark:text-slate-400 text-sm font-semibold tracking-wide uppercase ml-1">
                    Full Name
                </label>
<div class="relative">
<input class="form-input flex w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base font-medium transition-all" placeholder="Enter your name" type="text" value="Alex Sterling"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-600 dark:text-slate-400 text-sm font-semibold tracking-wide uppercase ml-1">
                    Email Address
                </label>
<div class="relative">
<input class="form-input flex w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base font-medium transition-all" placeholder="Enter your email" type="email" value="alex.sterling@fitness.com"/>
</div>
</div>
<!-- Bio Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-600 dark:text-slate-400 text-sm font-semibold tracking-wide uppercase ml-1">
                    Bio
                </label>
<div class="relative">
<textarea class="form-input flex w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary min-h-[120px] p-4 text-base font-medium resize-none transition-all" placeholder="Tell us about your fitness goals...">Certified HIIT instructor and nutrition enthusiast. On a journey to run my first marathon in 2024. Always looking for new healthy recipes! 🏃‍♂️🥗</textarea>
</div>
</div>
<!-- Additional Settings (Fitness Context) -->
<div class="mt-4 flex flex-col gap-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Preferences</h3>
<div class="flex items-center justify-between p-4 rounded-xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">fitness_center</span>
<span class="font-medium">Workout Reminders</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-400 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</div>
</div>
<div class="flex items-center justify-between p-4 rounded-xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">restaurant_menu</span>
<span class="font-medium">Macro Tracking</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-400 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</div>
</div>
</div>
<!-- Delete Account Subtle Button -->
<button class="mt-8 text-red-500 dark:text-red-400/80 text-sm font-semibold hover:underline">
                Delete Account
            </button>
</div>
<!-- Android Bottom Navigation Bar (Spacer for modern gesture bars) -->
<div class="h-8 bg-transparent"></div>
</div>
</body></html>
