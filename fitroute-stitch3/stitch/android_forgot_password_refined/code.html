<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Android Forgot Password Refined</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f26c0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex h-full w-full max-w-[430px] mx-auto flex-col overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center p-4">
<button aria-label="Go back" class="flex size-10 items-center justify-center rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h2 class="ml-2 text-lg font-semibold leading-tight tracking-tight">Forgot Password</h2>
</div>
<!-- Hero Branding Area -->
<div class="px-6 pt-10 pb-6">
<div class="mb-6 flex size-16 items-center justify-center rounded-2xl bg-primary/10 text-primary">
<span class="material-symbols-outlined !text-4xl">lock_reset</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">
                Reset your password
            </h1>
<p class="mt-3 text-base font-normal leading-relaxed text-slate-600 dark:text-slate-400">
                Enter the email address associated with your fitness account and we'll send you a secure link to reset your password.
            </p>
</div>
<!-- Input Section -->
<div class="flex flex-col gap-6 px-6 py-4">
<div class="relative group">
<label class="absolute -top-2.5 left-3 bg-background-light dark:bg-background-dark px-1 text-xs font-medium text-primary transition-all" for="email">
                    Email address
                </label>
<div class="flex items-center gap-3 rounded-lg border-2 border-primary/50 bg-transparent px-4 py-4 focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-slate-400">mail</span>
<input class="w-full bg-transparent border-none p-0 text-base font-normal text-slate-900 dark:text-white placeholder:text-slate-500 focus:ring-0" id="email" name="email" placeholder="yourname@fitness.com" type="email"/>
</div>
</div>
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl bg-primary h-14 px-6 text-white text-base font-bold transition-all hover:brightness-110 active:scale-[0.98] shadow-lg shadow-primary/20">
<span>Send Reset Link</span>
</button>
</div>
<!-- Footer / Helper Links -->
<div class="mt-auto p-6 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                Remember your password? 
                <a class="font-semibold text-primary hover:underline ml-1" href="#">Log In</a>
</p>
</div>
<!-- Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent opacity-20"></div>
<!-- Background Image/Pattern Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[-1]">
<img alt="Abstract gym background pattern" class="w-full h-full object-cover" data-alt="Dark abstract texture with gym equipment silhouettes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_W4GM0c7-aGZBV2NBPKTPQK-oxRrRbvCZkyqotaQsRg4ZJaQyKaKYKosKAoUlQF81C_3Dbcy-mP3yFCuXGZBG0iCv44OfSHyBvGLvQeLdVjRMjeZv0ESGGWHzrBeJMoikV9ORx_ZBkfjCGfNmbW69_fiRuEU_1Tixa8I291mT-PW-lj5Qih-iSTMiYRE3F8GoHCuk1oV2hdyPBkVK6FwgPj3HqFSIL-5AEcad62eFfqNXCSR2k6cmgYyt51YQmzOehJ5nPvDsmg"/>
</div>
</div>
</body></html>
